app:
  base-url: ${APP_BASE_URL:http://localhost:8080}

  upload:
    base-dir: ${UPLOAD_BASE_DIR}
    url-path: /files/hrms

  async:
    pool:
      core-size: ${ASYNC_CORE_SIZE:4}
      max-size: ${ASYNC_MAX_SIZE:10}
      queue-capacity: ${ASYNC_QUEUE_CAPACITY:50}

# Sandbox API Configuration (https://developer.sandbox.co.in)
sandbox:
  api:
    key: ${SANDBOX_API_KEY:}
    secret: ${SANDBOX_API_SECRET:}
    url: ${SANDBOX_API_URL:https://api.sandbox.co.in}

spring:
  application:
    name: SellsHRMS

  task:
    scheduling:
      pool:
        size: 5
      thread-name-prefix: attendance-scheduler-

  devtools:
    add-properties: false
    restart:
      enabled: true
      additional-paths:
        - src/main/resources
        - src/main/java
        - src/main/webapp

  web:
    resources:
      cache:
        period: 0

  session:
    store-type: jdbc
    jdbc:
      initialize-schema: always
      flush-mode: immediate
      save-mode: on_get_attribute

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:SellsHRMS}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:hrmsuser}
    password: ${DB_PASSWORD:hrmspassword}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: false

  mvc:
    view:
      prefix: /WEB-INF/views/
      suffix: .jsp

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

server:
  port: ${SERVER_PORT:8080}

  servlet:
    jsp:
      init-parameters:
        development: true
        check-interval: 0

  error:
    whitelabel:
      enabled: false
    include-message: always

logging:
  level:
    "[org.springframework]": INFO
    "[com.sellspark.SellsHRMS]": DEBUG
    "[com.sellspark.SellsHRMS.controller.api]": DEBUG
    "[org.springframework.security.web.FilterChainProxy]": INFO
    "[org.springframework.web.servlet.resource.ResourceHttpRequestHandler]": ERROR
